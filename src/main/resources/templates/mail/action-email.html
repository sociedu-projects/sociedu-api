<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${subject}">UniShare</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f1f5f9;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(15,23,42,0.08);">
          <tr>
            <td style="background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);padding:28px 32px;text-align:center;">
              <div style="color:#ffffff;font-size:22px;font-weight:700;letter-spacing:-0.02em;" th:text="${brandName}">UniShare</div>
              <div style="color:rgba(255,255,255,0.92);font-size:14px;margin-top:6px;" th:text="${headline}">Tiêu đề</div>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px 8px;">
              <p style="margin:0 0 16px;color:#334155;font-size:15px;line-height:1.6;" th:text="${description}">
                Mô tả.
              </p>
              <p style="margin:0 0 20px;color:#64748b;font-size:13px;line-height:1.5;">
                Liên kết có hiệu lực trong <strong th:text="${validMinutes}">10</strong> phút.
                <span th:text="${validityExtra}"></span>
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:8px 32px 28px;">
              <a th:href="${actionUrl}" href="#"
                 th:text="${actionLabel}"
                 style="display:inline-block;background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);color:#ffffff;text-decoration:none;font-weight:600;font-size:15px;padding:14px 32px;border-radius:10px;">
                Hành động
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 24px;">
              <p style="margin:0;color:#94a3b8;font-size:12px;line-height:1.5;text-align:center;">
                Nếu nút không hoạt động, sao chép liên kết sau vào trình duyệt:<br/>
                <span style="word-break:break-all;color:#64748b;" th:text="${actionUrl}">https://</span>
              </p>
            </td>
          </tr>
          <tr>
            <td style="background:#f8fafc;border-top:1px solid #e2e8f0;padding:16px 32px;text-align:center;">
              <p style="margin:0;color:#94a3b8;font-size:11px;">
                © <span th:text="${year}">2026</span> <span th:text="${brandName}">UniShare</span>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
